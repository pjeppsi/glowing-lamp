<h2 mat-dialog-title>Mark users for comparison</h2>

<mat-dialog-content>
  <p class="hint">Choose up to {{ maxSelection }} users to plot on the comparison chart.</p>

  <div class="table-scroll">
    <table mat-table [dataSource]="entries">
      <ng-container matColumnDef="select">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let entry">
          <mat-checkbox
            [checked]="isSelected(entry.userId)"
            (change)="toggle(entry.userId)"
            [attr.aria-label]="'Select ' + entry.firstName + ' ' + entry.lastName"
          ></mat-checkbox>
        </td>
      </ng-container>

      <ng-container matColumnDef="rank">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let entry">{{ entry.rank }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let entry">{{ entry.firstName }} {{ entry.lastName }}</td>
      </ng-container>

      <ng-container matColumnDef="points">
        <th mat-header-cell *matHeaderCellDef>Points</th>
        <td mat-cell *matCellDef="let entry">{{ entry.totalPoints }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" type="button" (click)="apply()">Compare</button>
</mat-dialog-actions>
